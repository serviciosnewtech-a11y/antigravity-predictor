services:

  # ── Dashboard ─────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      - predictor
    networks:
      - antigravity

  # ── Predictor ─────────────────────────────────────────────────────────────
  predictor:
    build:
      context: .
      dockerfile: predictor/Dockerfile
    restart: unless-stopped
    ports:
      - "${PREDICTOR_PORT:-18910}:18910"
    env_file: .env
    environment:
      - SA_INFERENCE_BACKEND=${SA_INFERENCE_BACKEND:-disabled}
      - HERMES_PROXY_URL=${HERMES_PROXY_URL:-http://host.docker.internal:8645/v1}
      - HERMES_INFERENCE_MODEL=${HERMES_INFERENCE_MODEL:-operator-approved-model}
      - HERMES_PROXY_API_KEY=${HERMES_PROXY_API_KEY:-local}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
    volumes:
      - ${MODELS_DIR:-./models}:/app/models:ro
      - ${DATA_DIR:-./data}:/app/data:ro
      - ${LOGS_DIR:-./logs}:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - antigravity

  # ── Executor ──────────────────────────────────────────────────────────────
  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    restart: unless-stopped
    ports:
      - "${EXECUTOR_PORT:-18911}:18911"
    env_file: .env
    environment:
      - EXCHANGE=${EXCHANGE:-bybit}
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY:-}
      - EXCHANGE_API_SECRET=${EXCHANGE_API_SECRET:-}
      - PREDICTOR_URL=http://predictor:18910
    volumes:
      - ${LOGS_DIR:-./logs}:/app/logs
    networks:
      - antigravity

  # ── Forge — strategy testing & evaluation ────────────────────────────────
  forge:
    build:
      context: .
      dockerfile: forge/Dockerfile
    restart: unless-stopped
    ports:
      - "${FORGE_PORT:-18912}:18912"
    environment:
      - PREDICTOR_WS_URL=ws://predictor:18910/ws
      - ATR_PERIOD=14
    volumes:
      - ${FORGE_DATA_DIR:-./forge_data}:/app/forge_data
    depends_on:
      - predictor
    networks:
      - antigravity


  # ── Signal Agent — Hermes LLM enrichment layer ───────────────────────────────
  signal_agent:
    build:
      context: .
      dockerfile: signal_agent/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Predictor is on the internal Docker network — never hits nginx.
      - PREDICTOR_URL=http://predictor:18910
      # Threshold calibrated to actual model output range (0.18-0.28).
      # .env overrides this; the value here is a hard fallback.
      - SA_CONFIDENCE_THRESHOLD=${SA_CONFIDENCE_THRESHOLD:-0.22}
      - SA_COOLDOWN_SECONDS=${SA_COOLDOWN_SECONDS:-900}
      - SA_POLL_INTERVAL=${SA_POLL_INTERVAL:-30}
      - SA_INFERENCE_BACKEND=${SA_INFERENCE_BACKEND:-disabled}
      - HERMES_PROXY_URL=${HERMES_PROXY_URL:-http://host.docker.internal:8645/v1}
      - HERMES_INFERENCE_MODEL=${HERMES_INFERENCE_MODEL:-operator-approved-model}
      - HERMES_PROXY_API_KEY=${HERMES_PROXY_API_KEY:-local}
      # Optional advanced fallbacks only
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ${LOGS_DIR:-./logs}:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - predictor
    networks:
      - antigravity

  # ── Retrain (run-once, not always-on) ─────────────────────────────────────
  retrain:
    build:
      context: .
      dockerfile: retrain/Dockerfile
    profiles: ["retrain"]          # only starts with: docker compose --profile retrain run --rm retrain
    env_file: .env
    environment:
      - MIN_AUC=${MIN_AUC:-0.54}
    volumes:
      - ${MODELS_DIR:-./models}:/app/models
      - ${DATA_DIR:-./data}:/app/data
      - ${LOGS_DIR:-./logs}:/app/logs
    networks:
      - antigravity

networks:
  antigravity:
    driver: bridge
