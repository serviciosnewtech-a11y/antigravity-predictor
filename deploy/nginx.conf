# Antigravity Predictor — nginx reverse proxy
# Place at: /etc/nginx/sites-available/predictor
# Enable:   ln -s /etc/nginx/sites-available/predictor /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d your.domain.com

server {
    listen 80;
    server_name _;   # Replace with your domain or VPS IP

    # Redirect HTTP → HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    # Access controls — restrict to known IPs in production
    # allow 1.2.3.4;
    # deny all;

    # Dashboard (static files served by FastAPI's StaticFiles mount)
    location / {
        proxy_pass         http://127.0.0.1:18910;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # REST API
    location /api/ {
        proxy_pass         http://127.0.0.1:18910/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # WebSocket — signal stream
    location /ws {
        proxy_pass         http://127.0.0.1:18910/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;   # Keep WS alive for 1h
        proxy_send_timeout 3600s;
    }
}

# HTTPS block (filled in by certbot, or manually):
# server {
#     listen 443 ssl;
#     server_name your.domain.com;
#     ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
