server {
    listen 80;
    server_name _;

    # Static dashboard files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy WebSocket to predictor
    location /ws {
        proxy_pass         http://predictor:18910;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy REST API to predictor
    location /api/ {
        proxy_pass         http://predictor:18910/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy /health, /predict, /enriched to predictor
    location ~ ^/(health|predict|enriched) {
        proxy_pass         http://predictor:18910;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy executor API
    location /executor/ {
        proxy_pass         http://executor:18911/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy Forge — strategy evaluation engine
    location /forge/ {
        proxy_pass         http://forge:18912/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Serve dashboard SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
